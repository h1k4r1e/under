<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNDER</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#000;
overflow:hidden;
color:white;
height:100vh;
}

/* 全画面 */

.screen{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;

background:
radial-gradient(
circle at center,
rgba(255,255,255,0.05) 0%,
#000 70%
);
}

/* ロゴ */

.logo{
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);

font-size:64px;
font-weight:200;
letter-spacing:10px;

z-index:10;
}

/* 軌道 */

.orbit{
position:absolute;
border-radius:50%;
border:1px solid rgba(255,255,255,0.06);

left:50%;
top:50%;
transform:translate(-50%,-50%);
}

.orbit1{
width:420px;
height:420px;
}

.orbit2{
width:320px;
height:320px;
}

.orbit3{
width:220px;
height:220px;
}

/* 中央コア */

.center{
position:absolute;
top:48%;
left:50%;
transform:translate(-50%,-50%);
z-index:2;
}

/* 陰陽 */

.yinyang{
position:relative;

width:240px;
height:240px;

border-radius:50%;
overflow:hidden;

background:
linear-gradient(
135deg,
white 0%,
white 50%,
black 50%,
black 100%
);

box-shadow:
0 0 80px rgba(255,255,255,0.12),
0 0 160px rgba(255,255,255,0.04);

animation:spin 20s linear infinite;
}

.yinyang::before{
content:'';

position:absolute;
top:0;
left:50%;
transform:translateX(-50%);

width:120px;
height:120px;

border-radius:50%;

background:
linear-gradient(
180deg,
rgba(255,255,255,0.9),
rgba(80,80,80,1)
);
}

.yinyang::after{
content:'';

position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);

width:120px;
height:120px;

border-radius:50%;

background:
linear-gradient(
180deg,
rgba(70,70,70,1),
rgba(10,10,10,1)
);
}

/* ドット */

.dot1{
position:absolute;
top:54px;
left:50%;
transform:translateX(-50%);

width:18px;
height:18px;
border-radius:50%;
background:white;
z-index:3;
}

.dot2{
position:absolute;
bottom:54px;
left:50%;
transform:translateX(-50%);

width:18px;
height:18px;
border-radius:50%;
background:black;
z-index:3;
}

/* アーティスト */

.artist{
position:absolute;

width:92px;
height:92px;

border-radius:50%;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:
linear-gradient(
180deg,
rgba(255,255,255,0.18),
rgba(255,255,255,0.04)
);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 0 40px rgba(255,255,255,0.04);

z-index:5;
}

.artist .name{
font-size:14px;
}

.artist .city{
margin-top:4px;
font-size:10px;
opacity:0.6;
}

/* 配置修正 */

.a1{
top:180px;
left:40px;
}

.a2{
top:300px;
right:40px;
}

.a3{
bottom:230px;
left:55px;
}

.a4{
bottom:210px;
right:60px;
}

/* signal */

.signal{
position:absolute;

bottom:170px;
left:50%;
transform:translateX(-50%);

padding:20px 38px;

border-radius:999px;

background:
linear-gradient(
180deg,
rgba(255,255,255,0.16),
rgba(255,255,255,0.05)
);

backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,0.08);

font-size:13px;
letter-spacing:7px;

z-index:10;
}

/* ナビ */

.bottom-nav{
position:absolute;

bottom:48px;
left:50%;
transform:translateX(-50%);

display:flex;
gap:20px;

z-index:10;
}

.nav{
width:86px;
height:86px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
180deg,
rgba(255,255,255,0.12),
rgba(255,255,255,0.03)
);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.08);

font-size:18px;
}

/* 星 */

.star{
position:absolute;
width:3px;
height:3px;
border-radius:50%;
background:white;
opacity:0.7;
}

.s1{
top:150px;
left:100px;
}

.s2{
top:240px;
right:80px;
}

.s3{
bottom:260px;
left:70px;
}

.s4{
bottom:320px;
right:120px;
}

/* 回転 */

@keyframes spin{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

</style>
</head>

<body>

<div class="screen">

<!-- orbit -->

<div class="orbit orbit1"></div>
<div class="orbit orbit2"></div>
<div class="orbit orbit3"></div>

<!-- stars -->

<div class="star s1"></div>
<div class="star s2"></div>
<div class="star s3"></div>
<div class="star s4"></div>

<!-- logo -->

<div class="logo">
UNDER
</div>

<!-- artist -->

<div class="artist a1">
<div class="name">KOWICHI</div>
<div class="city">Tokyo</div>
</div>

<div class="artist a2">
<div class="name">Lil Yuto</div>
<div class="city">Tokyo</div>
</div>

<div class="artist a3">
<div class="name">VENOM</div>
<div class="city">Osaka</div>
</div>

<div class="artist a4">
<div class="name">MARZY</div>
<div class="city">Tokyo</div>
</div>

<!-- center -->

<div class="center">

<div class="yinyang">

<div class="dot1"></div>
<div class="dot2"></div>

</div>

</div>

<!-- signal -->

<div class="signal">
ENTER THE SIGNAL
</div>

<!-- nav -->

<div class="bottom-nav">

<div class="nav">
探索
</div>

<div class="nav">
共鳴
</div>

<div class="nav">
空間
</div>

</div>

</div>

</body>
</html>
