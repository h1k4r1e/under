<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>UNDER</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
color:white;
}

.space{
position:relative;
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:
radial-gradient(circle at center, #222 0%, #000 70%);
}

.yinyang{
width:260px;
height:260px;
border-radius:50%;
background:
radial-gradient(circle at 50% 25%, white 12px, transparent 13px),
radial-gradient(circle at 50% 75%, black 12px, transparent 13px),
linear-gradient(to bottom, white 50%, black 50%);
position:relative;
box-shadow:
0 0 40px rgba(255,255,255,0.15),
0 0 120px rgba(255,255,255,0.05);
animation:rotate 18s linear infinite;
}

.yinyang::before{
content:'';
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:130px;
height:130px;
background:black;
border-radius:50%;
}

.yinyang::after{
content:'';
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:130px;
height:130px;
background:white;
border-radius:50%;
}

h1{
margin-top:40px;
letter-spacing:12px;
font-weight:200;
font-size:42px;
}

p{
opacity:0.7;
margin-top:10px;
font-size:14px;
letter-spacing:3px;
}

.enter{
margin-top:40px;
padding:18px 48px;
border-radius:999px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.15);
color:white;
font-size:16px;
letter-spacing:4px;
}

@keyframes rotate{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}
</style>
</head>

<body>

<div class="space">

<div class="yinyang"></div>

<h1>UNDER</h1>

<p>ENTER THE SIGNAL</p>

<div class="enter">
宇宙へ入る
</div>

</div>

</body>
</html>
