<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>UNDER</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#000;
overflow:hidden;
color:white;
}

/* 全体 */

.screen{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
background:
radial-gradient(circle at center,
rgba(255,255,255,0.06) 0%,
#000 65%);
}

/* 宇宙リング */

.orbit{
position:absolute;
border:1px solid rgba(255,255,255,0.06);
border-radius:50%;
left:50%;
top:50%;
transform:translate(-50%,-50%);
}

.orbit1{
width:95vw;
height:95vw;
max-width:650px;
max-height:650px;
}

.orbit2{
width:72vw;
height:72vw;
max-width:500px;
max-height:500px;
}

.orbit3{
width:50vw;
height:50vw;
max-width:350px;
max-height:350px;
}

/* ロゴ */

.logo{
position:absolute;
top:70px;
left:50%;
transform:translateX(-50%);
font-size:15vw;
font-weight:200;
letter-spacing:10px;
z-index:10;
}

@media(min-width:700px){
.logo{
font-size:70px;
}
}

/* 中央配置 */

.core-wrap{
position:absolute;
top:48%;
left:50%;
transform:translate(-50%,-50%);
width:85vw;
height:85vw;
max-width:420px;
max-height:420px;
display:flex;
justify-content:center;
align-items:center;
}

/* 陰陽 */

.yinyang{
position:relative;
width:58vw;
height:58vw;
max-width:260px;
max-height:260px;
border-radius:50%;
overflow:hidden;
background:
linear-gradient(
135deg,
white 0%,
white 50%,
black 50%,
black 100%
);
box-shadow:
0 0 60px rgba(255,255,255,0.12),
0 0 140px rgba(255,255,255,0.06);
animation:rotate 18s linear infinite;
}

/* 上の丸 */

.yinyang::before{
content:'';
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:50%;
height:50%;
background:
radial-gradient(circle at 50% 35%,
rgba(255,255,255,0.8),
rgba(80,80,80,1));
border-radius:50%;
}

/* 下の丸 */

.yinyang::after{
content:'';
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:50%;
height:50%;
background:
radial-gradient(circle at 50% 35%,
rgba(80,80,80,1),
rgba(20,20,20,1));
border-radius:50%;
}

/* ドット */

.dot-white{
position:absolute;
top:27%;
left:50%;
transform:translateX(-50%);
width:22px;
height:22px;
border-radius:50%;
background:white;
z-index:2;
}

.dot-black{
position:absolute;
bottom:27%;
left:50%;
transform:translateX(-50%);
width:22px;
height:22px;
border-radius:50%;
background:black;
z-index:2;
}

/* アーティスト */

.artist{
position:absolute;
width:90px;
height:90px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:
linear-gradient(
180deg,
rgba(255,255,255,0.22),
rgba(255,255,255,0.04)
);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 0 40px rgba(255,255,255,0.06);

animation:float 6s ease-in-out infinite;
}

.artist .name{
font-size:15px;
}

.artist .city{
margin-top:6px;
font-size:11px;
opacity:0.7;
}

/* 配置 */

.artist1{
top:24%;
left:16%;
}

.artist2{
top:40%;
right:15%;
animation-delay:2s;
}

.artist3{
bottom:22%;
left:20%;
animation-delay:4s;
}

.artist4{
bottom:19%;
right:18%;
animation-delay:1s;
}

/* signal */

.signal{
position:absolute;
bottom:170px;
left:50%;
transform:translateX(-50%);
padding:22px 40px;
border-radius:999px;

background:
linear-gradient(
180deg,
rgba(255,255,255,0.16),
rgba(255,255,255,0.05)
);

backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,0.08);

letter-spacing:8px;
font-size:14px;

box-shadow:
0 0 40px rgba(255,255,255,0.05);
}

/* 下ナビ */

.bottom-nav{
position:absolute;
bottom:50px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:18px;
z-index:5;
}

.nav{
width:88px;
height:88px;
border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
180deg,
rgba(255,255,255,0.12),
rgba(255,255,255,0.03)
);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.08);

font-size:18px;

box-shadow:
0 0 30px rgba(255,255,255,0.05);
}

/* 星 */

.star{
position:absolute;
width:3px;
height:3px;
border-radius:50%;
background:white;
opacity:0.8;
}

.s1{
top:20%;
left:18%;
}

.s2{
top:34%;
right:24%;
}

.s3{
bottom:28%;
left:30%;
}

.s4{
top:72%;
right:18%;
}

/* 回転 */

@keyframes rotate{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

/* 浮遊 */

@keyframes float{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(-12px);
}
100%{
transform:translateY(0px);
}
}

</style>
</head>

<body>

<div class="screen">

<!-- 宇宙リング -->

<div class="orbit orbit1"></div>
<div class="orbit orbit2"></div>
<div class="orbit orbit3"></div>

<!-- 星 -->

<div class="star s1"></div>
<div class="star s2"></div>
<div class="star s3"></div>
<div class="star s4"></div>

<!-- ロゴ -->

<div class="logo">
UNDER
</div>

<!-- 中央 -->

<div class="core-wrap">

<div class="yinyang">

<div class="dot-white"></div>
<div class="dot-black"></div>

</div>

</div>

<!-- アーティスト -->

<div class="artist artist1">
<div class="name">KOWICHI</div>
<div class="city">Tokyo</div>
</div>

<div class="artist artist2">
<div class="name">Lil Yuto</div>
<div class="city">Tokyo</div>
</div>

<div class="artist artist3">
<div class="name">VENOM</div>
<div class="city">Osaka</div>
</div>

<div class="artist artist4">
<div class="name">MARZY</div>
<div class="city">Tokyo</div>
</div>

<!-- signal -->

<div class="signal">
ENTER THE SIGNAL
</div>

<!-- ナビ -->

<div class="bottom-nav">

<div class="nav">
探索
</div>

<div class="nav">
共鳴
</div>

<div class="nav">
空間
</div>

</div>

</div>

</body>
</html>
